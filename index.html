<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qui est ta copine ?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        body.page-restart {
            background: linear-gradient(135deg, #ffd6e8 0%, #ffe0ef 100%);
        }

        body.page-copine {
            background: linear-gradient(135deg, #ffeb3b 0%, #fdd835 100%);
        }

        body.page-julie {
            background: #0a0a0a;
        }

        body.page-claire {
            background: linear-gradient(135deg, #ff69b4 0%, #ffc0cb 100%);
        }

        body.page-love-gauge {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
        }

        body.page-not-enough {
            background: linear-gradient(135deg, #87ceeb 0%, #add8e6 100%);
        }

        body.page-date {
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
        }

        body.page-door {
            background: linear-gradient(135deg, #8b6f47 0%, #654321 100%);
        }

        body.page-yes {
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6d9 100%);
        }

        body.page-no {
            background: linear-gradient(135deg, #4a148c 0%, #6a1b9a 100%);
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 60px 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .page-restart .container {
            background: rgba(255, 255, 255, 0.9);
        }

        .page-copine .container {
            background: rgba(255, 255, 255, 0.9);
        }

        .page-julie .container {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #8b0000;
        }

        .page-claire .container {
            background: rgba(255, 255, 255, 0.95);
        }

        .page-love-gauge .container {
            background: rgba(255, 255, 255, 0.95);
        }

        .page-not-enough .container {
            background: rgba(255, 255, 255, 0.95);
        }

        .page-date .container {
            background: rgba(255, 255, 255, 0.95);
        }

        .page-door .container {
            background: transparent;
            padding: 0;
        }

        .page-yes .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .page-no .container {
            background: rgba(0, 0, 0, 0.6);
        }

        h1 {
            margin-bottom: 50px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .page-restart h1 {
            font-size: 2.5rem;
            color: #ff69b4;
        }

        .page-copine h1 {
            font-size: 2.5rem;
            color: #333;
        }

        .page-julie h1 {
            font-size: 2.5rem;
            color: #cc0000;
            text-shadow: 0 0 20px rgba(204, 0, 0, 0.8);
            font-style: italic;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .page-claire h1 {
            font-size: 2.2rem;
            color: #ff69b4;
        }

        .page-love-gauge h1 {
            font-size: 2.5rem;
            color: #cc0000;
        }

        .page-not-enough h1 {
            font-size: 2.5rem;
            color: #0066cc;
        }

        .page-date h1 {
            font-size: 2.5rem;
            color: #333;
        }

        .page-yes h1 {
            font-size: 3rem;
            color: #ff1493;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
            animation: pulse 1s ease-in-out infinite;
        }

        .page-no h1 {
            font-size: 2.2rem;
            color: #ffffff;
        }

        .emoji-heart {
            font-size: 2rem;
            margin: 0 8px;
            display: inline-block;
            animation: heartbeat 1.2s ease-in-out infinite;
        }

        .emoji-heart:nth-child(2) {
            animation-delay: 0.2s;
        }

        .emoji-heart:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes blood-drop {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
        }

        @keyframes doorOpen {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(-90deg);
            }
        }

        @keyframes arrowBounce {
            0%, 100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(10px);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 5;
            font-size: 1.5rem;
        }

        .blood-drop {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            opacity: 0.3;
            animation: blood-drop 3s ease-in-out infinite;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-choice {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            min-width: 150px;
        }

        .btn-choice:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.6);
            background: linear-gradient(135deg, #f57c00 0%, #e65100 100%);
        }

        .page-restart .btn-choice {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
        }

        .page-restart .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.6);
            background: linear-gradient(135deg, #ff1493 0%, #c71585 100%);
        }

        .page-julie .btn-choice {
            background: linear-gradient(135deg, #8b0000 0%, #660000 100%);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.6);
            color: white;
            border: 2px solid #cc0000;
        }

        .page-julie .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(204, 0, 0, 0.8);
            background: linear-gradient(135deg, #660000 0%, #440000 100%);
        }

        .page-claire .btn-choice {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
        }

        .page-claire .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.6);
            background: linear-gradient(135deg, #ff1493 0%, #c71585 100%);
        }

        .page-love-gauge .btn-choice {
            background: linear-gradient(135deg, #cc0000 0%, #990000 100%);
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.6);
        }

        .page-love-gauge .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(204, 0, 0, 0.8);
            background: linear-gradient(135deg, #990000 0%, #660000 100%);
        }

        .page-not-enough .btn-choice {
            background: linear-gradient(135deg, #0099ff 0%, #0066cc 100%);
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.6);
        }

        .page-not-enough .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.8);
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
        }

        .page-date .btn-choice {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .page-date .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .page-yes .btn-choice {
            background: linear-gradient(135deg, #ff1493 0%, #c71585 100%);
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.6);
            color: white;
        }

        .page-yes .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.8);
            background: linear-gradient(135deg, #c71585 0%, #a00e6d 100%);
        }

        .page-no .btn-choice {
            background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%);
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4);
        }

        .page-no .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(156, 39, 176, 0.6);
            background: linear-gradient(135deg, #7b1fa2 0%, #4a148c 100%);
        }

        button:active {
            transform: translateY(-1px);
        }

        /* Page cachée */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Jauge d'amour */
        .gauge-container {
            margin: 40px 0;
            width: 100%;
        }

        .gauge-bar {
            width: 100%;
            height: 40px;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
        }

        .gauge-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444 0%, #ff8888 100%);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .gauge-percentage {
            font-size: 1.2rem;
            color: #333;
            font-weight: bold;
        }

        /* Formulaire de date */
        .form-group {
            margin: 30px 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #333;
        }

        .form-group input {
            width: 100%;
            max-width: 300px;
            padding: 12px 15px;
            font-size: 1rem;
            border: 2px solid #667eea;
            border-radius: 8px;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .form-group input::placeholder {
            color: #999;
        }

        /* Page Porte */
        .door-scene {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            position: relative;
            height: 400px;
        }

        .door-wrapper {
            position: relative;
            perspective: 1000px;
        }

        .door {
            width: 150px;
            height: 300px;
            background: linear-gradient(135deg, #8b6f47 0%, #654321 100%);
            border: 3px solid #3d2817;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.6s ease;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .door.opened {
            animation: doorOpen 0.6s ease forwards;
        }

        .lock {
            font-size: 3rem;
            transition: all 0.3s ease;
        }

        .door.opened .lock {
            display: none;
        }

        .arrow {
            font-size: 2rem;
            display: none;
            animation: arrowBounce 1s ease-in-out infinite;
            cursor: pointer;
        }

        .door.opened .arrow {
            display: block;
        }

        .key {
            width: 80px;
            height: 50px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: grab;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            user-select: none;
            transition: transform 0.2s ease;
        }

        .key:active {
            cursor: grabbing;
        }

        .key.dragging {
            opacity: 0.8;
        }

        .key.used {
            opacity: 0.3;
            cursor: default;
        }

        /* Cœurs en arrière-plan pour la page YES */
        .hearts-bg {
            position: fixed;
            font-size: 3rem;
            opacity: 0.3;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
            z-index: 1;
        }

        .hearts-bg:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .hearts-bg:nth-child(2) {
            top: 50%;
            right: 10%;
            animation-delay: 1s;
        }

        .hearts-bg:nth-child(3) {
            top: 70%;
            left: 20%;
            animation-delay: 2s;
        }

        .hearts-bg:nth-child(4) {
            top: 30%;
            right: 25%;
            animation-delay: 1.5s;
        }

        .hearts-bg:nth-child(5) {
            bottom: 15%;
            left: 50%;
            animation-delay: 2.5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .page-yes .hearts-bg {
            opacity: 0.4;
        }

        /* Contrôle audio */
        .audio-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 105, 180, 0.9);
            padding: 12px 18px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.4);
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .audio-control:hover {
            background: rgba(255, 20, 147, 1);
            transform: scale(1.15);
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.6);
        }
    </style>
</head>
<body class="page-restart">
    <!-- Audio romantique -->
    <audio id="musicYes" loop volume="0.6">
        <source src="https://assets.mixkit.co/active_storage/sfx/2706/2706-preview.mp3" type="audio/mpeg">
        Votre navigateur ne supporte pas l'élément audio.
    </audio>

    <!-- Page: Restart -->
    <div class="page active" id="page-restart">
        <div class="container">
            <h1>
                Coucou mon amour, tu es pret?
                <span class="emoji-heart">❤️</span>
                <span class="emoji-heart">💕</span>
                <span class="emoji-heart">❤️</span>
            </h1>
            <div class="buttons">
                <button class="btn-choice" onclick="goToCopine()">Ready</button>
            </div>
        </div>
    </div>

    <!-- Page: Qui est ta copine ? -->
    <div class="page" id="page-copine">
        <div class="container">
            <h1>Qui est ta copine ?</h1>
            <div class="buttons">
                <button class="btn-choice" onclick="goToLoveGauge()">Claire</button>
                <button class="btn-choice" onclick="goToJulie()">Julie</button>
            </div>
        </div>
    </div>

    <!-- Page: Julie (Dark/Scary) -->
    <div class="page" id="page-julie">
        <div id="blood-container"></div>
        <div class="container">
            <h1>Julie n'existe pas... 🩸</h1>
            <div class="buttons">
                <button class="btn-choice" onclick="goToRestart()">On recommence</button>
            </div>
        </div>
    </div>

    <!-- Page: Love Gauge -->
    <div class="page" id="page-love-gauge">
        <div class="container">
            <h1>Combien tu l'aime? ❤️</h1>
            <div class="gauge-container">
                <div class="gauge-bar">
                    <div class="gauge-fill" id="gaugeFill"></div>
                </div>
                <div class="gauge-percentage" id="gaugePercentage">0%</div>
            </div>
            <div class="buttons">
                <button class="btn-choice" onclick="increaseGauge()">+</button>
            </div>
        </div>
    </div>

    <!-- Page: Not Enough Love -->
    <div class="page" id="page-not-enough">
        <div class="container">
            <h1>C'est tout...?</h1>
            <div class="buttons">
                <button class="btn-choice" onclick="goToRestart()">Oust</button>
            </div>
        </div>
    </div>

    <!-- Page: Question de la date -->
    <div class="page" id="page-date">
        <div class="container">
            <h1>Quel est notre date où on c'est mis ensemble?</h1>
            <div class="form-group">
                <input 
                    type="text" 
                    id="dateInput" 
                    placeholder="JJ/MM/AA"
                    maxlength="8"
                >
            </div>
            <div class="buttons">
                <button class="btn-choice" onclick="checkDate()">Valider</button>
            </div>
        </div>
    </div>

    <!-- Page: Door with Key -->
    <div class="page" id="page-door">
        <div class="container">
            <div class="door-scene">
                <div class="key" id="key" draggable="true">🔑</div>
                <div class="door-wrapper">
                    <div class="door" id="door" ondrop="dropKey(event)" ondragover="allowDrop(event)">
                        <div class="lock">🔒</div>
                        <div class="arrow" onclick="goToClaire()">➜</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Page: Claire Message -->
    <div class="page" id="page-claire">
        <div class="container">
            <h1>Veut-elle te dire quelque chose?</h1>
            <div class="buttons">
                <button class="btn-choice" onclick="goToYes()">Oui</button>
                <button class="btn-choice" onclick="goToNo()">Non</button>
            </div>
        </div>
    </div>

    <!-- Page: Oui (Confession d'amour) -->
    <div class="page" id="page-yes">
        <div id="hearts-container"></div>
        <div class="container">
            <h1>Je t'aime mon amour ❤️</h1>
            <div class="buttons">
                <button class="btn-choice" onclick="goToRestart()">Retour</button>
            </div>
        </div>
        <div class="audio-control" onclick="toggleMusic()" title="Cliquez pour activer/désactiver la musique">
            🎵
        </div>
    </div>

    <!-- Page: Non -->
    <div class="page" id="page-no">
        <div class="container">
            <h1>Pourquoi tu es la alors?</h1>
            <div class="buttons">
                <button class="btn-choice" onclick="goToRestart()">Retour</button>
            </div>
        </div>
    </div>

    <script>
        let musicPlaying = false;
        let lovePercentage = 0;
        let keyUsed = false;

        function showPage(pageId, bodyClass) {
            // Masquer toutes les pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            // Afficher la page demandée
            document.getElementById(pageId).classList.add('active');

            // Changer la classe du body
            document.body.className = bodyClass;

            // Si c'est la page YES, lancer les confetti, ajouter les cœurs et la musique
            if (pageId === 'page-yes') {
                createConfetti();
                createHeartsBg();
                playMusic();
            } else if (pageId === 'page-julie') {
                createBloodDrops();
                stopMusic();
            } else {
                stopMusic();
            }

            // Réinitialiser la clé si on revient à la page porte
            if (pageId === 'page-door') {
                resetDoor();
            }
        }

        function goToRestart() {
            showPage('page-restart', 'page-restart');
            removeAllConfetti();
            removeAllBlood();
            lovePercentage = 0;
            updateGaugeDisplay();
            keyUsed = false;
        }

        function goToCopine() {
            showPage('page-copine', 'page-copine');
            removeAllConfetti();
            removeAllBlood();
        }

        function goToLoveGauge() {
            lovePercentage = 0;
            updateGaugeDisplay();
            showPage('page-love-gauge', 'page-love-gauge');
        }

        function goToClaire() {
            showPage('page-claire', 'page-claire');
        }

        function goToJulie() {
            showPage('page-julie', 'page-julie');
        }

        function goToYes() {
            showPage('page-yes', 'page-yes');
        }

        function goToNo() {
            showPage('page-no', 'page-no');
        }

        function goToDate() {
            document.getElementById('dateInput').value = '';
            showPage('page-date', 'page-date');
        }

        function goToDoor() {
            resetDoor();
            showPage('page-door', 'page-door');
        }

        // Fonction pour augmenter la jauge d'amour
        function increaseGauge() {
            if (lovePercentage < 100) {
                lovePercentage += 10;
                if (lovePercentage > 100) {
                    lovePercentage = 100;
                }
                updateGaugeDisplay();

                // Si on atteint 100%, aller à la page suivante
                if (lovePercentage === 100) {
                    setTimeout(() => {
                        goToDate();
                    }, 500);
                }
            }
        }

        // Fonction pour mettre à jour l'affichage de la jauge
        function updateGaugeDisplay() {
            document.getElementById('gaugeFill').style.width = lovePercentage + '%';
            document.getElementById('gaugePercentage').textContent = lovePercentage + '%';

            // Mettre à jour le texte dans la jauge si elle n'est pas vide
            if (lovePercentage > 0) {
                document.getElementById('gaugeFill').textContent = lovePercentage + '%';
            } else {
                document.getElementById('gaugeFill').textContent = '';
            }
        }

        // Fonction pour vérifier la date
        function checkDate() {
            const dateInput = document.getElementById('dateInput');
            const correctDate = '4/10/24';
            const userInput = dateInput.value;

            if (userInput === correctDate) {
                // Bonne réponse, aller à la page porte
                goToDoor();
            } else {
                // Mauvaise réponse, réinitialiser le champ
                dateInput.value = '';
                dateInput.style.borderColor = '#ff6b6b';
                setTimeout(() => {
                    dateInput.style.borderColor = '#667eea';
                }, 500);
            }
        }

        // Drag & Drop pour la clé
        function allowDrop(event) {
            event.preventDefault();
        }

        function dragKey(event) {
            if (!keyUsed) {
                event.dataTransfer.effectAllowed = 'move';
                document.getElementById('key').classList.add('dragging');
            }
        }

        function dragEnd(event) {
            document.getElementById('key').classList.remove('dragging');
        }

        function dropKey(event) {
            event.preventDefault();
            if (!keyUsed) {
                keyUsed = true;
                document.getElementById('key').classList.add('used');
                document.getElementById('door').classList.add('opened');
            }
        }

        function resetDoor() {
            keyUsed = false;
            const key = document.getElementById('key');
            const door = document.getElementById('door');
            key.classList.remove('used', 'dragging');
            door.classList.remove('opened');
        }

        // Ajouter les event listeners pour drag
        document.addEventListener('DOMContentLoaded', () => {
            const key = document.getElementById('key');
            if (key) {
                key.addEventListener('dragstart', dragKey);
                key.addEventListener('dragend', dragEnd);
            }

            const dateInput = document.getElementById('dateInput');
            if (dateInput) {
                dateInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        checkDate();
                    }
                });
            }
        });

        // Fonction pour créer les taches de sang
        function createBloodDrops() {
            const container = document.getElementById('blood-container');
            container.innerHTML = '';

            const bloodCount = 30;
            for (let i = 0; i < bloodCount; i++) {
                const blood = document.createElement('div');
                blood.classList.add('blood-drop');
                blood.textContent = '🩸';
                blood.style.fontSize = (Math.random() * 2 + 1) + 'rem';
                blood.style.left = Math.random() * 100 + '%';
                blood.style.top = Math.random() * 100 + '%';
                blood.style.animationDelay = Math.random() * 2 + 's';
                blood.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(blood);
            }
        }

        // Fonction pour créer les confetti
        function createConfetti() {
            const confettiCount = 100;
            const confettiTypes = ['❤️', '💕', '💖', '💗', '💓'];

            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    confetti.textContent = confettiTypes[Math.floor(Math.random() * confettiTypes.length)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.animationDuration = (3 + Math.random() * 2) + 's';
                    confetti.style.animation = `confetti-fall ${3 + Math.random() * 2}s linear forwards`;
                    document.body.appendChild(confetti);

                    // Supprimer le confetti après l'animation
                    setTimeout(() => confetti.remove(), 5000);
                }, i * 30);
            }
        }

        // Fonction pour créer les cœurs en arrière-plan
        function createHeartsBg() {
            const container = document.getElementById('hearts-container');
            container.innerHTML = '';

            const heartsCount = 5;
            const positions = [
                { top: '10%', left: '5%' },
                { top: '50%', right: '10%' },
                { top: '70%', left: '20%' },
                { top: '30%', right: '25%' },
                { bottom: '15%', left: '50%' }
            ];

            for (let i = 0; i < heartsCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('hearts-bg');
                heart.textContent = '❤️';
                heart.style.animationDelay = (i * 0.5) + 's';

                const pos = positions[i];
                if (pos.top) heart.style.top = pos.top;
                if (pos.bottom) heart.style.bottom = pos.bottom;
                if (pos.left) heart.style.left = pos.left;
                if (pos.right) heart.style.right = pos.right;

                container.appendChild(heart);
            }
        }

        // Fonction pour supprimer tous les confetti
        function removeAllConfetti() {
            document.querySelectorAll('.confetti').forEach(c => c.remove());
            document.getElementById('hearts-container').innerHTML = '';
        }

        // Fonction pour supprimer tout le sang
        function removeAllBlood() {
            document.getElementById('blood-container').innerHTML = '';
        }

        // Fonction pour jouer la musique
        function playMusic() {
            const audio = document.getElementById('musicYes');
            audio.play().catch(err => console.log('Autoplay bloqué, musique non lancée'));
            musicPlaying = true;
        }

        // Fonction pour arrêter la musique
        function stopMusic() {
            const audio = document.getElementById('musicYes');
            audio.pause();
            audio.currentTime = 0;
            musicPlaying = false;
        }

        // Fonction pour activer/désactiver la musique
        function toggleMusic() {
            const audio = document.getElementById('musicYes');
            if (musicPlaying) {
                audio.pause();
                musicPlaying = false;
            } else {
                audio.play();
                musicPlaying = true;
            }
        }

        // Redirection depuis la page d'accueil
        function startJourney() {
            goToRestart();
        }
    </script>
</body>
</html>
